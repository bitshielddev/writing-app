name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build production application
        run: npm run build

      - name: Enforce renderer bundle budget
        run: npm run bundle:check

      - name: Run built Electron end-to-end tests
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Run unpacked packaged smoke test
        run: xvfb-run --auto-servernum npm run test:packaged-smoke

      - name: Upload Electron diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-test-results
          path: test-results/
